<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <title>RFootball Store — Camisas de Futebol</title>
  <meta name="description" content="RFootball Store — a melhor qualidade em camisas de futebol por um preço acessível." />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#202c33" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta property="og:title" content="RFootball Store" />
  <meta property="og:description" content="A melhor qualidade em camisas de futebol por um preço acessível." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
</head>
<body>

<div id="app">

  <!-- SIDEBAR desktop -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <div id="sidebar-avatar">R</div>
      <div id="sidebar-icons">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.99 4c0-1.1-.89-2-1.99-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h14l4 4-.01-18z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </div>
    </div>
    <div id="sidebar-search">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" placeholder="Pesquisar ou começar uma nova conversa" readonly tabindex="-1" />
      </div>
    </div>
    <div id="sidebar-conversations">
      <div class="convo-item active">
        <div class="convo-avatar">R</div>
        <div class="convo-info">
          <div class="convo-top">
            <span class="convo-name">Robson | RFootball Store</span>
            <span class="convo-time" id="sidebar-time">agora</span>
          </div>
          <div class="convo-preview" id="sidebar-preview">⚽ Olá! Bem-vindo à RFootball Store...</div>
        </div>
        <div class="convo-badge" id="sidebar-badge">1</div>
      </div>
    </div>
  </aside>

  <!-- CHAT -->
  <main id="chat-area">

    <header id="chat-header">
      <div id="header-avatar">
        <span class="avatar-letter">R</span>
        <span class="online-dot"></span>
      </div>
      <div id="header-info">
        <div id="header-name">Robson | RFootball Store</div>
        <div id="header-status" class="online">online</div>
      </div>
      <div id="header-actions">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </div>
    </header>

    <!-- Prova social -->
    <div id="social-proof">
      <span>⚽ <strong id="proof-count">1.247</strong> pessoas já encontraram sua camisa aqui</span>
    </div>

    <div id="chat-messages-wrap">
      <div id="chat-messages">
        <div class="date-separator"><span id="date-label">hoje</span></div>
        <!-- Notificação de entrada -->
        <div class="system-msg" id="join-msg" style="display:none">Robson entrou no chat.</div>
        <div id="typing-indicator">
          <div class="typing-bubble">
            <div class="typing-dots"><span></span><span></span><span></span></div>
          </div>
        </div>
      </div>
    </div>

    <div id="options-area" class="hidden"></div>

    <div id="input-area">
      <span class="input-icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#8696a0"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
      </span>
      <textarea id="msg-input" placeholder="Digite sua mensagem..." rows="1" disabled autocomplete="off" spellcheck="true"></textarea>
      <span class="input-icon" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#8696a0"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
      </span>
      <button id="send-btn" disabled aria-label="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </main>
</div>

<div id="toast" role="alert"></div>

<script src="script.js"></script>
</body>
</html>
